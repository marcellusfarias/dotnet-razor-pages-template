version: '3.7'

services:
  app:
    environment:
        - ASPNETCORE_URLS=https://+:443
    ports:
        - "8080:443"
    volumes:
      - data-protection-keys:/root/.aspnet/DataProtection-Keys

  seq:
    image: datalust/seq:2024.3
    ports:
      - "5341:5341"
      - "8081:80"
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - seq-data:/data

volumes:
  seq-data:
  data-protection-keys:
